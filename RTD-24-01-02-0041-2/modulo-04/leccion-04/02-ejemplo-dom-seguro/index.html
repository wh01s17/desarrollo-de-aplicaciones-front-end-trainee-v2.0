<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DOM Seguro</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>
    <body>
        <main class="container py-5">
            <h1 class="text-center mb-4">Manipulacion Segura del DOM</h1>

            <!-- Formulario -->
            <form class="input-group mb-4 mx-auto">
                <input
                    type="text"
                    name="inputNombre"
                    id="inputNombre"
                    placeholder="Escribe tu nombre"
                    class="form-control"
                />
                <button id="btnAgregar" type="button" class="btn btn-primary">
                    Agregar
                </button>
            </form>

            <!-- Salida -->
            <section class="row g-4">
                <div class="col-12 col-md-6">
                    <h2 class="text-success text-center">SEGURO</h2>
                    <div id="listaSegura"></div>
                </div>

                <div class="col-12 col-md-6">
                    <h2 class="text-danger text-center">INSEGURO</h2>
                    <div id="listaInsegura"></div>
                </div>
            </section>

            <aside class="alert alert-warning mt-5 mx-auto w-75 text-center">
                <code> &lt;img src="x" onerror='alert("XSS")' &gt; </code>
            </aside>
        </main>

        <script src="assets/js/main.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
