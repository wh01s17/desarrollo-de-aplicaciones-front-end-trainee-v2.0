<!doctype html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Personajes LOTR</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <link rel="stylesheet" href="assets/css/styles.css" />
    </head>
    <body class="bg-body dark py-4">
        <main id="myApp" class="container app">
            <h1 class="text-warning text-center mb-5">Ficha del Personaje</h1>

            <!-- Cargando -->
            <div v-if="loading" class="alert alert-secondary text-center">
                Cargando personajes...
            </div>

            <!-- Errores -->
            <div v-else-if="error" class="alert alert-danger">{{error}}</div>

            <!-- Contenido -->
            <section v-else>
                <div class="mb-5">
                    <label for="personaje" class="form-label fw-semibold">
                        Elige un personaje:
                    </label>

                    <select
                        id="personajes"
                        class="form-select"
                        v-model="personajeSeleccionado"
                        @change="seleccionarPersonaje"
                    >
                        <option disabled :value="null">
                            -- Seleccione uno --
                        </option>
                        <option
                            v-for="personaje in personajes"
                            :key="personaje.id"
                            :value="personaje"
                        >
                            {{ personaje.nombre }}
                        </option>
                    </select>
                </div>

                <div
                    v-if="!personajeSeleccionado"
                    class="alert alert-secondary text-center"
                >
                    Selecciona un personaje del dropdown para ver su ficha
                </div>

                <article
                    v-else
                    class="card text-center border-5"
                    :class="{
                        'border-success': personajeSeleccionado.bando === 'comunidad',
                        'border-danger': personajeSeleccionado.bando === 'mordor',
                    }"
                >
                    <div class="card-body">
                        <img
                            class="rounded-circle mb-2 avatar"
                            :src="personajeSeleccionado.imagen"
                            :alt="'Imagen de ' + personajeSeleccionado.nombre"
                        />

                        <h2 class="card-title">
                            {{ personajeSeleccionado.nombre }}
                        </h2>

                        <p class="card-text fst-italic mb-2">
                            {{ personajeSeleccionado.raza }}
                        </p>

                        <p class="mb-2">
                            Nivel:
                            <strong>{{ personajeSeleccionado.nivel }}</strong>
                        </p>

                        <button
                            class="btn btn-warning"
                            @click="mostrarDetalles = !mostrarDetalles"
                        >
                            {{ mostrarDetalles ? 'Ocultar' : "Ver" }} detalles
                        </button>

                        <div
                            v-show="mostrarDetalles"
                            class="text-start mt-2 p-3 bg-body-tertiary rounded"
                        >
                            <p class="mb-2">
                                <strong>Arma:</strong>{{
                                personajeSeleccionado.arma }}
                            </p>

                            <p class="mb-1"><strong>Frases:</strong></p>

                            <ul>
                                <li
                                    v-for="(frase, indice) in personajeSeleccionado.frases"
                                    :key="indice"
                                >
                                    "{{ frase }}"
                                </li>
                            </ul>
                        </div>
                    </div>
                </article>
            </section>
        </main>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="assets/js/app.js"></script>
    </body>
</html>
