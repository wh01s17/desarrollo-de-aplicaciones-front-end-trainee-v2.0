<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Style Binding</title>
    </head>
    <body>
        <main id="myApp">
            <h1 :style="{color: titleColor, textAlign: 'center'}">
                Citas de Lord Of The Rings
            </h1>

            <button @click="toggleColor">Cambiar color de titulo</button>
            <hr />

            <ul :style="ulListStyle">
                <li
                    v-for="{id, quote, author} in quotes"
                    :key="id"
                    :style="itemStyle"
                >
                    <span>{{ quote }}</span>
                    <blockquote>- {{author}}</blockquote>
                </li>
            </ul>
        </main>

        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="assets/js/app.js"></script>
    </body>
</html>
