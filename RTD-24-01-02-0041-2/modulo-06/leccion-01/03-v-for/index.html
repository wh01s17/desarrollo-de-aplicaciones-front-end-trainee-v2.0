<html lang="en">
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>v-for</title>
    </head>
    <body>

            <ul>

            </ul>
        </main>

        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="assets/js/app.js"></script>
    </body>
