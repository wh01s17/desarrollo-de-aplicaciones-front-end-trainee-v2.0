<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ejemplo DOM</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="assets/css/style.css" />
    </head>
    <body class="pagina">
        <main
            class="container py-4 text-center d-flex flex-column align-items-center"
        >
            <h1 class="mb-4">Generador de Saludos</h1>

            <form id="form" class="card p-3 mb-3">
                <div class="mb-2">
                    <label for="nombre" class="form-label">Nombre:</label>
                    <input type="text" id="nombre" class="form-control" />
                </div>

                <div class="mb-2">
                    <label for="veces">Cuantas veces?</label>
                    <input
                        type="number"
                        id="veces"
                        class="form-control"
                        value="1"
                    />
                </div>

                <div class="mb-2">
                    <label for="color" class="form-label"
                        >Color de fondo:</label
                    >
                    <input
                        type="color"
                        id="color"
                        class="form-control form-control-color"
                        value="#2de109"
                    />
                </div>

                <div class="form-check mb-3">
                    <input
                        type="checkbox"
                        id="invertir"
                        class="form-check-input"
                    />
                    <label for="invertir" class="form-label"
                        >Invertir Nombre</label
                    >
                </div>

                <button type="submit" class="btn btn-outline-primary">
                    Saludar!
                </button>
            </form>

            <section class="d-flex gap-2 mb-3">
                <button id="btn-modo" class="btn btn-dark">Modo Oscuro</button>

                <button id="btn-quitar" class="btn btn-outline-secondary">
                    Quitar destacado
                </button>
            </section>

            <section id="resultados"></section>
        </main>

        <script src="assets/js/main.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
