<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CineBlub</title>

        <!-- CSS Bootrstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />

        <!-- Nuestro CSS -->
        <link rel="stylesheet" href="assets/css/style.css" />
    </head>

    <body class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="#"
                    ><i class="fa-solid fa-film"></i>CineClub</a
                >
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup"
                    aria-controls="navbarNavAltMarkup"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav ms-auto">
                        <a
                            id="link-home"
                            class="nav-link active"
                            aria-current="page"
                            href="#"
                            >Home</a
                        >
                        <a class="nav-link" href="#">About</a>
                    </div>
                </div>
            </div>
        </nav>

        <header class="container my-5">
            <h1 class="text-center">Catalogo de peliculas</h1>
            <p class="text-center text-muted">
                Explora nuestra coleccion de peliculas y has click en una
                pelicula para mas detalle
            </p>
        </header>

        <main class="d-flex flex-column flex-grow-1">
            <section id="vista-home" class="py-5">
                <div class="container">
                    <div id="peliculas-container" class="row g-4"></div>
                </div>
            </section>

            <section id="vista-detalle" class="py-5 d-none flex-grow-1">
                <div class="container">
                    <button id="btn-volver" class="btn btn-outline-light mb-4">
                        <i class="fa-solid fa-arrow-left"></i>Volver al catalogo
                    </button>

                    <div id="detalle-container"></div>
                </div>
            </section>
        </main>

        <footer class="bg-dark text-white text-center py-4">
            <div class="container">
                <p class="mb-0">
                    <i class="fa-solid fa-film"></i>CineClub &copy; 2026
                </p>
            </div>
        </footer>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <script src="assets/js/main.js"></script>
    </body>
</html>
