<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>jQuery</title>

        <!-- CSS Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <!-- CSS Personalizado -->
        <link rel="stylesheet" href="assets/css/styles.css" />
    </head>

    <body>
        <header class="container">
            <h1 id="titulo" class="negro">Ejemplo jQuery</h1>

            <button id="btn-cambiar-color" class="btn btn-primary">
                Cambiar color
            </button>

            <button id="btn-cambiar-texto" class="btn btn-secondary">
                Cambiar texto
            </button>

            <button id="btn-texto-negrita" class="btn btn-warning">
                Texto en negrita
            </button>
        </header>

        <main>
            <section class="container py-5">
                <button id="btn-ocultar-lista" class="btn btn-primary">
                    Ocultar lista
                </button>

                <button id="btn-agregar" class="btn btn-warning">
                    Agregar elemento
                </button>

                <button id="btn-agregar-inicio" class="btn btn-info">
                    Agregar elemento al inicio
                </button>

                <button id="btn-eliminar" class="btn btn-danger">
                    Eliminar elemento
                </button>

                <ul id="lista" class="pt-3">
                    <li>Elemento 1</li>
                    <li>Elemento 2</li>
                    <li>Elemento 3</li>
                </ul>
            </section>

            <section class="container">
                <button
                    id="info-tooltip"
                    class="btn btn-secondary"
                    data-bs-toggle="tooltip"
                    data-bs-title="Este es un tooltip"
                    data-bs-placement="bottom"
                >
                    Tooltip
                </button>
            </section>
        </main>

        <!-- JS Bootstrap -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>

        <!-- jQuery -->
        <script
            src="https://code.jquery.com/jquery-4.0.0.min.js"
            integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
            crossorigin="anonymous"
        ></script>

        <!-- JS personalizado -->
        <script src="assets/js/main.js"></script>
    </body>
</html>
